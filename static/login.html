<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalWear — Login</title>
<link rel="stylesheet" href="css/vitalwear.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="pulse-ring">
        <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <div class="brand">Vital<span>Wear</span></div>
      <div class="sub">EMERGENCY RESPONSE SYSTEM</div>
    </div>

    <div class="form-group">
      <label>EMAIL ADDRESS</label>
      <input type="email" id="login-email" placeholder="Enter your email" value="admin@vitalwear.com">
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="login-pass" placeholder="Enter password" value="admin123">
    </div>
    <button class="btn-login" onclick="doLogin()">ACCESS SYSTEM</button>
    
    <p style="text-align: center; margin-top: 20px; color: var(--muted); font-size: 11px;">
      Demo: admin@vitalwear.com / admin123
    </p>
  </div>
</div>

<script>
// Mock user data for demo
const MOCK_USERS = [
  { id: 1, name: 'Admin User', email: 'admin@vitalwear.com', role: 'admin', password: 'admin123' },
  { id: 2, name: 'John Responder', email: 'john@ responder.com', role: 'responder', password: 'responder123' },
  { id: 3, name: 'Jane Rescuer', email: 'jane@rescuer.com', role: 'rescuer', password: 'rescuer123' }
];

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;

  // Find user in mock data
  const user = MOCK_USERS.find(u => u.email === email && u.password === password);
  
  if (!user) {
    alert('Invalid email or password. Try: admin@vitalwear.com / admin123');
    return;
  }

  // Create mock token and store in localStorage
  const token = btoa(JSON.stringify({ userId: user.id, email: user.email, role: user.role }));
  localStorage.setItem('vw_token', token);
  localStorage.setItem('vw_user', JSON.stringify(user));
  
  // Redirect to dashboard
  window.location.href = 'pages/index.html';
}
</script>
</body>
</html>
